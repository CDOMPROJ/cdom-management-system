version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: cdom_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cdom.org
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8081:80"

  backend:
    build: ..
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data: