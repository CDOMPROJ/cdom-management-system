version: '3.9'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: cdom_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cdom.org
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8081:80"

  backend:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db
    # Clean migration + start (no custom Python scripts)
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"

volumes:
  postgres_data: